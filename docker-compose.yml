version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: board_user
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: board_db
    ports: ["5432:5432"]
  redis:
    image: redis:7
    ports: ["6379:6379"]

  backend:
    build: ./backend
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://board_user:secret@db:5432/board_db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app